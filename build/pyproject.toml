[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "murobox-midi-homeassistant"
version = "0.1.3"
description = "Scaffold for a Home Assistant BLE MIDI integration targeting the Muro Box N-20."
requires-python = ">=3.12"

[project.optional-dependencies]
test = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23"
]

[tool.setuptools]
packages = []

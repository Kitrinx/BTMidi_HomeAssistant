<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Muro Box BLE MIDI Icon</title>
  <desc id="desc">
    A stylized music box with a cylinder, comb, and Bluetooth rune for the
    Muro Box BLE MIDI Home Assistant integration.
  </desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#183640" />
      <stop offset="100%" stop-color="#245360" />
    </linearGradient>
    <linearGradient id="lid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6BB0AF" />
      <stop offset="100%" stop-color="#4A8F95" />
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2B45B" />
      <stop offset="100%" stop-color="#B87A24" />
    </linearGradient>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)" />

  <g transform="rotate(-11 182 178)">
    <rect
      x="92"
      y="126"
      width="198"
      height="78"
      rx="26"

  <circle cx="190" cy="332" r="66" fill="url(#metal)" />
  <circle cx="190" cy="332" r="52" fill="none" stroke="#F7D79B" stroke-width="8" />

  <circle cx="166" cy="304" r="6" fill="#F9E5B8" />
  <circle cx="212" cy="316" r="6" fill="#F9E5B8" />
  <circle cx="174" cy="352" r="6" fill="#F9E5B8" />
  <circle cx="220" cy="364" r="6" fill="#F9E5B8" />

  <g stroke="#183640" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="190" y1="286" x2="190" y2="378" />
    <polyline points="190,286 226,316 190,332 226,362 190,378" />
